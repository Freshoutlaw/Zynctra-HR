spring:
  application:
    name: auth-service
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
          fetch_size: 50
  datasource:
    url: jdbc:postgresql://localhost:5432/zynctra_auth
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

security:
  jwt:
    secret: ${JWT_SECRET:mysupersecretsecurekey123456789012345678901234567890}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
    refresh-expiration-ms: ${REFRESH_TOKEN_EXPIRATION_MS:604800000}

server:
  port: 8001
  servlet:
    context-path: /auth

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: always
