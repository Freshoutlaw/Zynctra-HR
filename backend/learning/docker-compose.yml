version: '3.8'

services:
  learning-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zynctra-learning
    restart: unless-stopped
    user: "1000:1000"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - zynctra-backend
      - zynctra-external
    environment:
      - SPRING_PROFILES_ACTIVE=production
      - SERVER_PORT=8085
      - LEARNING_DB_URL=jdbc:postgresql://postgres:5432/zynctra_learning
      - LEARNING_DB_USER=zynctra_learning
      - LEARNING_DB_PASSWORD_FILE=/run/secrets/learning_db_password
      - AI_SERVICE_URL=${AI_SERVICE_URL}
      - AI_SERVICE_API_KEY_FILE=/run/secrets/ai_service_key
      - LEARNING_MASTER_SECRET_FILE=/run/secrets/learning_master_secret
      - JWT_SECRET_FILE=/run/secrets/jwt_secret
    secrets:
      - learning_db_password
      - ai_service_key
      - learning_master_secret
      - jwt_secret
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=300m
      - /var/log/zynctra:rw,noexec,nosuid,size=100m
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8085/api/learning/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

networks:
  zynctra-backend:
    internal: true
  zynctra-external:
    driver: bridge

secrets:
  learning_db_password:
    file: ./secrets/learning_db_password.txt
  ai_service_key:
    file: ./secrets/ai_service_key.txt
  learning_master_secret:
    file: ./secrets/learning_master_secret.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt