spring:
  application:
    name: core-hr
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  datasource:
    url: jdbc:postgresql://localhost:5432/zynctra_hr
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}

server:
  port: 8002
  servlet:
    context-path: /hr
