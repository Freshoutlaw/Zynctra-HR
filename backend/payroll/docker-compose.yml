version: '3.8'

services:
  payroll-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zynctra-payroll
    restart: unless-stopped

    # Security context
    user: "1000:1000"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

    # Network isolation
    networks:
      - zynctra-backend
      - zynctra-external

    # Environment (secrets from Docker secrets, not env vars)
    environment:
      - SPRING_PROFILES_ACTIVE=production
      - SERVER_PORT=8084
      - PAYROLL_DB_URL=jdbc:postgresql://postgres:5432/zynctra_payroll
      - PAYROLL_DB_USER=zynctra_payroll
      - PAYROLL_DB_PASSWORD_FILE=/run/secrets/payroll_db_password
      - PII_MASTER_SECRET_FILE=/run/secrets/payroll_master_secret
      - JWT_ISSUER=Zynctra-HR
      - JWT_AUDIENCE=Zynctra-Payroll
      - TRUSTSTORE_PATH=/app/certs/truststore.jks
      - TRUSTSTORE_PASSWORD_FILE=/run/secrets/truststore_password
      - LOGGING_LEVEL_SECURITY_AUDIT=INFO

    # Secrets
    secrets:
      - payroll_db_password
      - payroll_master_secret
      - truststore_password

    # Temporary filesystems
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=200m
      - /var/log/zynctra:rw,noexec,nosuid,size=100m

    # Health check
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8084/api/payroll/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

    # Logging
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
        labels: "service_name,tenant_id"

networks:
  zynctra-backend:
    internal: true
  zynctra-external:
    driver: bridge

secrets:
  payroll_db_password:
    file: ./secrets/payroll_db_password.txt
  payroll_master_secret:
    file: ./secrets/payroll_master_secret.txt
  truststore_password:
    file: ./secrets/truststore_password.txt