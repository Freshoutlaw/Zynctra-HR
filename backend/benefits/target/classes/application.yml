server:
  port: 8083

spring:
  application:
    name: benefits-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:zynctra}
    username: ${DB_USER:zynctra_app}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    show-sql: false

security:
  rate-limit:
    capacity: 100
    refill-rate: 10
    abuse-threshold: 5
    cleanup-interval-minutes: 10

jwt:
  secret: ${JWT_SECRET}
  issuer: zynctra-hr
  audience: zynctra-api

logging:
  level:
    root: INFO
    com.zynctra.benefits: DEBUG
    ZYNCTRA_BENEFITS_AUDIT: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: never