version: '3.8'

services:
  # PostgreSQL Databases
  postgres-auth:
    image: postgres:15-alpine
    container_name: zynctra-postgres-auth
    environment:
      POSTGRES_DB: zynctra_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-hr:
    image: postgres:15-alpine
    container_name: zynctra-postgres-hr
    environment:
      POSTGRES_DB: zynctra_hr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_hr_data:/var/lib/postgresql/data
    depends_on:
      postgres-auth:
        condition: service_healthy

  postgres-payroll:
    image: postgres:15-alpine
    container_name: zynctra-postgres-payroll
    environment:
      POSTGRES_DB: zynctra_payroll
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_payroll_data:/var/lib/postgresql/data
    depends_on:
      postgres-auth:
        condition: service_healthy

  postgres-ats:
    image: postgres:15-alpine
    container_name: zynctra-postgres-ats
    environment:
      POSTGRES_DB: zynctra_ats
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - postgres_ats_data:/var/lib/postgresql/data
    depends_on:
      postgres-auth:
        condition: service_healthy

  postgres-attendance:
    image: postgres:15-alpine
    container_name: zynctra-postgres-attendance
    environment:
      POSTGRES_DB: zynctra_attendance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - postgres_attendance_data:/var/lib/postgresql/data
    depends_on:
      postgres-auth:
        condition: service_healthy

  # API Gateway
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: zynctra-api-gateway
    environment:
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3001,http://localhost:5173}
      JWT_SECRET: ${JWT_SECRET:-your-secure-secret-key-change-in-production}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-3600000}
      REFRESH_TOKEN_EXPIRATION_MS: ${REFRESH_TOKEN_EXPIRATION_MS:-604800000}
    ports:
      - "8000:8000"
    depends_on:
      - auth-service
      - core-hr-service
      - payroll-service
      - ats-service
      - time-attendance-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Auth Service
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: zynctra-auth-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-auth:5432/zynctra_auth
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET:-your-secure-secret-key-change-in-production}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-3600000}
      REFRESH_TOKEN_EXPIRATION_MS: ${REFRESH_TOKEN_EXPIRATION_MS:-604800000}
    ports:
      - "8001:8001"
    depends_on:
      postgres-auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/auth/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Core HR Service
  core-hr-service:
    build:
      context: ./core-hr
      dockerfile: Dockerfile
    container_name: zynctra-core-hr-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-hr:5432/zynctra_hr
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8002:8002"
    depends_on:
      postgres-hr:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/hr/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Payroll Service
  payroll-service:
    build:
      context: ./payroll
      dockerfile: Dockerfile
    container_name: zynctra-payroll-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-payroll:5432/zynctra_payroll
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8003:8003"
    depends_on:
      postgres-payroll:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/payroll/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ATS Service
  ats-service:
    build:
      context: ./ats
      dockerfile: Dockerfile
    container_name: zynctra-ats-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-ats:5432/zynctra_ats
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: zynctra
      SPRING_RABBITMQ_PASSWORD: zynctra-rabbitmq-password
    ports:
      - "8004:8004"
    depends_on:
      postgres-ats:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/ats/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Time & Attendance Service
  time-attendance-service:
    build:
      context: ./time-attendance
      dockerfile: Dockerfile
    container_name: zynctra-time-attendance-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-attendance:5432/zynctra_attendance
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    ports:
      - "8005:8005"
    depends_on:
      postgres-attendance:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/time-attendance/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Benefits Service
  benefits-service:
    build:
      context: ./benefits
      dockerfile: Dockerfile
    container_name: zynctra-benefits-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-benefits:5432/zynctra_benefits
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8086:8086"
    depends_on:
      postgres-benefits:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/benefits/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Analytics Service
  analytics-service:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    container_name: zynctra-analytics-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-analytics:5432/zynctra_analytics
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    ports:
      - "8006:8006"
    depends_on:
      postgres-analytics:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/analytics/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Performance Service
  performance-service:
    build:
      context: ./performance
      dockerfile: Dockerfile
    container_name: zynctra-performance-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-performance:5432/zynctra_performance
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8007:8007"
    depends_on:
      postgres-performance:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/performance/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Learning Service
  learning-service:
    build:
      context: ./learning
      dockerfile: Dockerfile
    container_name: zynctra-learning-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-learning:5432/zynctra_learning
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8008:8008"
    depends_on:
      postgres-learning:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/learning/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Security Admin Service
  security-admin-service:
    build:
      context: ./security-admin
      dockerfile: Dockerfile
    container_name: zynctra-security-admin-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-securityadmin:5432/zynctra_securityadmin
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    ports:
      - "8009:8009"
    depends_on:
      postgres-securityadmin:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8009/security-admin/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: zynctra-redis
    command: redis-server --requirepass zynctra-redis-password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: zynctra-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: zynctra
      RABBITMQ_DEFAULT_PASS: zynctra-rabbitmq-password
    ports:
      - "5672:5672"      # AMQP port
      - "15672:15672"    # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Missing PostgreSQL Databases
  postgres-benefits:
    image: postgres:15-alpine
    container_name: zynctra-postgres-benefits
    environment:
      POSTGRES_DB: zynctra_benefits
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5437:5432"
    volumes:
      - postgres_benefits_data:/var/lib/postgresql/data
    depends_on:
      postgres-auth:
        condition: service_healthy

  postgres-analytics:
    image: postgres:15-alpine
    container_name: zynctra-postgres-analytics
    environment:
      POSTGRES_DB: zynctra_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5438:5432"
    volumes:
      - postgres_analytics_data:/var/lib/postgresql/data
    depends_on:
      postgres-auth:
        condition: service_healthy

  postgres-performance:
    image: postgres:15-alpine
    container_name: zynctra-postgres-performance
    environment:
      POSTGRES_DB: zynctra_performance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5439:5432"
    volumes:
      - postgres_performance_data:/var/lib/postgresql/data
    depends_on:
      postgres-auth:
        condition: service_healthy

  postgres-learning:
    image: postgres:15-alpine
    container_name: zynctra-postgres-learning
    environment:
      POSTGRES_DB: zynctra_learning
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5440:5432"
    volumes:
      - postgres_learning_data:/var/lib/postgresql/data
    depends_on:
      postgres-auth:
        condition: service_healthy

  postgres-securityadmin:
    image: postgres:15-alpine
    container_name: zynctra-postgres-securityadmin
    environment:
      POSTGRES_DB: zynctra_securityadmin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5441:5432"
    volumes:
      - postgres_securityadmin_data:/var/lib/postgresql/data
    depends_on:
      postgres-auth:
        condition: service_healthy

  # Connector Service
  connector-service:
    build:
      context: ./connector-service
      dockerfile: Dockerfile
    container_name: zynctra-connector-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-securityadmin:5432/zynctra_connectors
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8010:8010"
    depends_on:
      postgres-securityadmin:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/connectors/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_auth_data:
  postgres_hr_data:
  postgres_payroll_data:
  postgres_ats_data:
  postgres_attendance_data:
  postgres_benefits_data:
  postgres_analytics_data:
  postgres_performance_data:
  postgres_learning_data:
  postgres_securityadmin_data:
  redis_data:
  rabbitmq_data:

networks:
  default:
    name: zynctra-network