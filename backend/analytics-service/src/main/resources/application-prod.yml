server:
  port: 8090

spring:
  application:
    name: analytics-service

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        default_schema: analytics
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: analytics
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: ${REDIS_SSL:true}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 30
          max-idle: 15
          min-idle: 5

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 900000

analytics:
  cache:
    ttl-seconds: 300
    max-size: 2000
  export:
    max-rows: 100000
    temp-dir: /tmp/zynctra-exports
    cleanup-age-hours: 24
  scheduled-reports:
    enabled: true
    thread-pool-size: 5
    max-concurrent: 3

logging:
  level:
    com.zynctra.analytics: WARN
    org.springframework.security: WARN
  pattern:
    console: "{\"timestamp\":\"%d{yyyy-MM-dd HH:mm:ss.SSS}\",\"level\":\"%p\",\"traceId\":\"%X{traceId}\",\"logger\":\"%logger{36}\",\"message\":\"%enc{%m}{JSON}\"}%n"

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}