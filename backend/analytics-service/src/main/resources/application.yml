server:
  port: 8006
  servlet:
    context-path: /analytics

spring:
  application:
    name: analytics-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5438/zynctra_analytics}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        default_schema: analytics
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: analytics
    baseline-on-migrate: true

  redis:
    host: ${SPRING_REDIS_HOST:localhost}
    port: ${SPRING_REDIS_PORT:6379}
    password: ${SPRING_REDIS_PASSWORD:}
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 30
        max-idle: 15
        min-idle: 5

management:
  server:
    port: 9090
  endpoints:
    web:
      exposure:
        include: health,metrics,info,prometheus
      base-path: /analytics/actuator
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    com.zynctra: ${LOGGING_LEVEL_COM_ZYNCTRA:DEBUG}

zynctra:
  analytics:
    cache-ttl: ${ANALYTICS_CACHE_TTL:300}
    export:
      max-rows: ${EXPORT_MAX_ROWS:100000}
    report-generation:
      timeout-seconds: ${REPORT_GENERATION_TIMEOUT_SECONDS:300}
