server:
  port: 8004
  servlet:
    context-path: /ats

spring:
  application:
    name: ats-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/zynctra_ats}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: ats
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:zynctra}
    password: ${SPRING_RABBITMQ_PASSWORD:zynctra-rabbitmq-password}
    listener:
      simple:
        acknowledge-mode: auto
        max-concurrency: 5

management:
  server:
    port: 9090
  endpoints:
    web:
      exposure:
        include: health,metrics,info,prometheus
      base-path: /ats/actuator
  endpoint:
    health:
      show-details: always
    enabled: true
    locations: classpath:db/migration
    schemas: ats
    baseline-on-migrate: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    ssl:
      enabled: ${RABBITMQ_SSL:false}

jwt:
  secret: ${JWT_SECRET:}

logging:
  level:
    com.zynctra.ats: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when_authorized