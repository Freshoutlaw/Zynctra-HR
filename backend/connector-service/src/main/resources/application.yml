server:
  port: 8010
  servlet:
    context-path: /connectors

spring:
  application:
    name: connector-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5441/zynctra_connectors}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: connectors
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

management:
  server:
    port: 9090
  endpoints:
    web:
      exposure:
        include: health,metrics,info,prometheus
      base-path: /connectors/actuator
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    com.zynctra: ${LOGGING_LEVEL_COM_ZYNCTRA:DEBUG}

zynctra:
  connectors:
    oauth:
      slack:
        signing-secret: ${SLACK_WEBHOOK_SIGNING_SECRET}
      workday:
        client-id: ${WORKDAY_OAUTH_CLIENT_ID}
        client-secret: ${WORKDAY_OAUTH_CLIENT_SECRET}
      salesforce:
        client-id: ${SALESFORCE_OAUTH_CLIENT_ID}
        client-secret: ${SALESFORCE_OAUTH_CLIENT_SECRET}
    webhooks:
      retry:
        attempts: ${WEBHOOK_RETRY_ATTEMPTS:3}
        delay-ms: ${WEBHOOK_RETRY_DELAY_MS:1000}
      encryption-enabled: true
