version: '3.8'

services:
  connector-service:
    build:
      context: ./backend/connector-service
      dockerfile: Dockerfile
    container_name: zynctra-connector
    restart: unless-stopped
    
    # Security context
    user: "1000:1000"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE  # Only if binding to privileged port
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    
    # Network isolation
    networks:
      - zynctra-backend
      - zynctra-external  # Only this service needs external access
    
    environment:
      - CONNECTOR_DB_URL=jdbc:postgresql://postgres:5432/zynctra_connectors
      - CONNECTOR_DB_USER=zynctra_connector
      - CONNECTOR_DB_PASSWORD=${CONNECTOR_DB_PASSWORD}
      - WEBHOOK_SECRET_SLACK=${WEBHOOK_SECRET_SLACK}
      - WEBHOOK_SECRET_WORKDAY=${WEBHOOK_SECRET_WORKDAY}
      - WEBHOOK_SECRET_SALESFORCE=${WEBHOOK_SECRET_SALESFORCE}
      - CONNECTOR_SIGNING_SECRET_SLACK=${CONNECTOR_SIGNING_SECRET_SLACK}
      - CONNECTOR_SIGNING_SECRET_WORKDAY=${CONNECTOR_SIGNING_SECRET_WORKDAY}
      - TRUSTSTORE_PATH=/app/certs/truststore.jks
      - TRUSTSTORE_PASSWORD=${TRUSTSTORE_PASSWORD}
    
    # Secrets management
    secrets:
      - connector_db_password
      - webhook_secrets
      - signing_secrets
    
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8083/api/connectors/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

networks:
  zynctra-backend:
    internal: true  # No external access
  zynctra-external:
    driver: bridge

secrets:
  connector_db_password:
    file: ./secrets/connector_db_password.txt
  webhook_secrets:
    file: ./secrets/webhook_secrets.env
  signing_secrets:
    file: ./secrets/signing_secrets.env