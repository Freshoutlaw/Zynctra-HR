server:
  port: 8007
  servlet:
    context-path: /performance
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain

spring:
  application:
    name: performance-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5439/zynctra_performance}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      leak-detection-threshold: 60000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: performance
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

management:
  server:
    port: 9090
  endpoints:
    web:
      exposure:
        include: health,metrics,info,prometheus
      base-path: /performance/actuator
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    com.zynctra: ${LOGGING_LEVEL_COM_ZYNCTRA:DEBUG}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        # Security: enable filter for tenant isolation
        session_factory:
          session_scoped_interceptor: com.zynctra.performance.security.TenantFilterInterceptor
    show-sql: false

  # Security: disable devtools in production
  devtools:
    restart:
      enabled: false

# Security Configuration
security:
  jwt:
    secret: ${JWT_SECRET:}
    expiration: 900000  # 15 minutes
    refresh-expiration: 604800000  # 7 days

# Rate Limiting (Resilience4j)
resilience4j:
  ratelimiter:
    instances:
      performance-strict:
        limitForPeriod: 20
        limitRefreshPeriod: 1m
        timeoutDuration: 100ms
        registerHealthIndicator: true
      performance-standard:
        limitForPeriod: 100
        limitRefreshPeriod: 1m
        timeoutDuration: 200ms
        registerHealthIndicator: true

# Actuator (Security-hardened)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
    info:
      enabled: true
  info:
    env:
      enabled: false  # Don't expose env vars

# Logging
logging:
  level:
    com.zynctra.performance: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /var/log/zynctra/performance-service.log